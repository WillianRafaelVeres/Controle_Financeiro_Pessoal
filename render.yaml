services:
  - type: web
    name: controle-financeiro-pessoal
    runtime: python
    rootDir: backend
    buildCommand: bash render-build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AUTH_ENABLED
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "https://controle-financeiro-pessoal-jz43.onrender.com"
